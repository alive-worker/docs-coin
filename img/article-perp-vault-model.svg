<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="永续合约资金池模式研究方法 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#7ec8e3" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7ec8e3" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#7ec8e3"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#7ec8e3">永续资金池模式</text>
  <g transform="translate(700,300)" filter="url(#softGlow)">
    <circle r="190" fill="url(#nodeGlow)"/>
    
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#7ec8e3" stroke-width="1.8" stroke-dasharray="2 7" opacity="0.8"/>
    <path d="M-5 -84 l8 5 l-8 5 z" fill="#7ec8e3" opacity="0.85" transform="rotate(0 0 -77)"/>
    <circle cx="0" cy="-140" r="38" fill="#111820" stroke="#7ec8e3" stroke-width="2.2"/>
    <text x="0" y="-78" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">做多交易者</text>
    <line x1="0" y1="0" x2="150" y2="90" stroke="#7ec8e3" stroke-width="1.8" stroke-dasharray="2 7" opacity="0.8"/>
    <path d="M77.5 42.50000000000001 l8 5 l-8 5 z" fill="#7ec8e3" opacity="0.85" transform="rotate(120.96375653207352 82.5 49.50000000000001)"/>
    <circle cx="150" cy="90" r="38" fill="#111820" stroke="#7ec8e3" stroke-width="2.2"/>
    <text x="150" y="152" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">做空交易者</text>
    <line x1="0" y1="0" x2="-150" y2="90" stroke="#7ec8e3" stroke-width="1.8" stroke-dasharray="2 7" opacity="0.8"/>
    <path d="M-87.5 42.50000000000001 l8 5 l-8 5 z" fill="#7ec8e3" opacity="0.85" transform="rotate(239.03624346792648 -82.5 49.50000000000001)"/>
    <circle cx="-150" cy="90" r="38" fill="#111820" stroke="#7ec8e3" stroke-width="2.2"/>
    <text x="-150" y="152" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">交易者</text>
    <circle r="54" fill="#0e1420" stroke="#7ec8e3" stroke-width="2.8"/>
    <text y="6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">LP资金池</text>
  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#7ec8e3">永续资金池模式</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">LP是每一笔交易的对手方</text>
</svg>
