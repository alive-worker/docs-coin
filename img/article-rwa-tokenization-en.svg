    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#a8c9a0">RWA</text>
  <g transform="translate(700,300)" filter="url(#softGlow)">
    <circle r="150" fill="url(#nodeGlow)"/>
    <circle cx="-170" cy="0" r="46" fill="#111820" stroke="#a8c9a0" stroke-width="2.5"/>
    <circle cx="170" cy="0" r="46" fill="#111820" stroke="#a8c9a0" stroke-width="2.5"/>
    <line x1="-124" y1="0" x2="124" y2="0" stroke="#a8c9a0" stroke-width="2.5" stroke-dasharray="2 8" opacity="0.9"/>
    <path d="M100 -6 l24 6 l-24 6 z" fill="#a8c9a0"/>
    <circle r="30" fill="#0e1420" stroke="#a8c9a0" stroke-width="2.5"/>
    <path d="M-11 4 h22 v11 a11 11 0 0 1 -22 0 z" fill="none" stroke="#a8c9a0" stroke-width="2"/>
    <path d="M-7 4 v-5 a7 7 0 0 1 14 0 v5" fill="none" stroke="#a8c9a0" stroke-width="2"/>
