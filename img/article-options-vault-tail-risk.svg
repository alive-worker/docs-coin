<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="期权金库（DOV）尾部风险研究 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc8b5c" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#cc8b5c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#cc8b5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#cc8b5c" stroke-width="1.4" stroke-opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#cc8b5c"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#cc8b5c">期权金库 DOV</text>
  <g transform="translate(700,300)" filter="url(#softGlow)">
    <circle r="220" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="-380" y="-80" width="760" height="170" fill="url(#hatch)"/>
    <rect x="-380" y="90" width="760" height="170" fill="#cc8b5c" opacity="0.10"/>
    <line x1="-380" y1="90" x2="380" y2="90" stroke="#cc8b5c" stroke-width="2.4" stroke-dasharray="3 6"/>
    <text x="230" y="80" font-family="'Consolas','Segoe UI',monospace" font-size="13" fill="#cc8b5c" text-anchor="start">行权价 Strike</text>
    <path d="M-380,230 C-300,220 -220,200 -160,190 S-40,150 20,120 S140,64 210,50" fill="none" stroke="#e8ecf2" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="210" cy="50" r="7" fill="#cc8b5c"/>
    <circle cx="210" cy="50" r="14" fill="none" stroke="#cc8b5c" stroke-width="1.6" opacity="0.7"/>
    <text x="-360" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="start">权利金收入区</text>
    <text x="-360" y="-40" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="start">敞口/让渡区</text>
  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#cc8b5c">期权金库策略</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">权利金背后是尾部风险敞口</text>
</svg>
