    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#9db4c9">LIQUID STAKING</text>
  <g transform="translate(700,300)" filter="url(#softGlow)">
