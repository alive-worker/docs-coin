      <stop offset="0%" stop-color="#9db4c9" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#9db4c9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#9db4c9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
