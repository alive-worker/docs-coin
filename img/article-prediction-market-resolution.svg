<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="预测市场结果裁定研究 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6f8fd9" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#6f8fd9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6f8fd9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#6f8fd9"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#6f8fd9">预测市场裁定机制</text>
  <g transform="translate(700,190)" filter="url(#softGlow)">
    <circle r="200" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="-330" y="-22" width="150" height="70" rx="10" fill="#111820" stroke="#6f8fd9" stroke-width="2"/>
    <text x="-255" y="6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#c9d3e0" text-anchor="middle">提议结果</text>
    <path d="M-180 13 L-80 13" stroke="#6f8fd9" stroke-width="2" stroke-dasharray="2 6"/>
    <path d="M-95 6 l15 7 l-15 7" fill="none" stroke="#6f8fd9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-75" y="-30" width="160" height="86" rx="10" fill="#241017" stroke="#6f8fd9" stroke-width="2.5"/>
    <text x="5" y="-2" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#6f8fd9" text-anchor="middle">挑战窗口期</text>
    <path d="M5 -30 C -60 -70, -120 -70, -170 -30" fill="none" stroke="#6f8fd9" stroke-width="1.8" stroke-dasharray="2 6" opacity="0.75"/>
    <path d="M-160 -22 l-14 -9 l4 16" fill="none" stroke="#6f8fd9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    <path d="M105 13 L200 13" stroke="#6f8fd9" stroke-width="2" stroke-dasharray="2 6"/>
    <path d="M185 6 l15 7 l-15 7" fill="none" stroke="#6f8fd9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="205" y="-22" width="150" height="70" rx="10" fill="#111820" stroke="#6f8fd9" stroke-width="2.5"/>
    <text x="280" y="6" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#c9d3e0" text-anchor="middle">最终裁定</text>
  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#6f8fd9">结果裁定机制</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">裁决权落在谁手里</text>
</svg>
