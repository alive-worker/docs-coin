<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="链上数据分析 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9bcdf7" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#9bcdf7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#9bcdf7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#9bcdf7"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#9bcdf7">链上数据</text>

  <g filter="url(#softGlow)">
    <line x1="300" y1="400" x2="900" y2="400" stroke="#3a4452" stroke-width="1.5"/>
    <rect x="340" y="340" width="46" height="60" rx="6" fill="#9bcdf7" fill-opacity="0.45"/>
    <rect x="412" y="300" width="46" height="100" rx="6" fill="#9bcdf7" fill-opacity="0.5700000000000001"/>
    <rect x="484" y="325" width="46" height="75" rx="6" fill="#9bcdf7" fill-opacity="0.69"/>
    <rect x="556" y="270" width="46" height="130" rx="6" fill="#9bcdf7" fill-opacity="0.81"/>
    <rect x="628" y="305" width="46" height="95" rx="6" fill="#9bcdf7" fill-opacity="0.9299999999999999"/>

    <polyline points="363,322 435,282 507,307 579,252 651,287" fill="none" stroke="#9bcdf7" stroke-width="2.5"/>
    <circle cx="363" cy="322" r="4" fill="#9bcdf7"/><circle cx="435" cy="282" r="4" fill="#9bcdf7"/><circle cx="507" cy="307" r="4" fill="#9bcdf7"/><circle cx="579" cy="252" r="4" fill="#9bcdf7"/><circle cx="651" cy="287" r="4" fill="#9bcdf7"/>
    <text x="920" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9bcdf7" text-anchor="start">TVL 趋势</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#9bcdf7">链上数据分析</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">读懂地址、交易与核心指标</text>
</svg>
