<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="信贷资产池分层结构研究 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c76b8a" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#c76b8a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c76b8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#c76b8a"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#c76b8a">信贷资产池分层</text>
  <g transform="translate(700,190)" filter="url(#softGlow)">
    <circle r="190" cy="90" fill="url(#nodeGlow)"/>
    <rect x="-200" y="0" width="400" height="90" rx="10" fill="#111820" stroke="#c76b8a" stroke-width="2"/>
    <text x="0" y="52" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#c9d3e0" text-anchor="middle">优先级份额</text>
    <rect x="-200" y="98" width="400" height="90" rx="10" fill="#241017" stroke="#c76b8a" stroke-width="2.5"/>
    <rect x="-200" y="148" width="400" height="40" rx="0" fill="#c76b8a" opacity="0.28"/>
    <text x="0" y="150" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#c76b8a" text-anchor="middle">劣后级份额</text>
    <path d="M215 188 L215 40" stroke="#c76b8a" stroke-width="2" stroke-dasharray="2 6" opacity="0.85"/>
    <path d="M209 60 l6 -22 l6 22" fill="none" stroke="#c76b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="230" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="start">违约率
上升</text>
  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#c76b8a">信贷资产池分层</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">劣后级先吸收损失</text>
</svg>
