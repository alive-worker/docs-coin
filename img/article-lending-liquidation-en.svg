<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lending Liquidation Mechanics cover image">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eddb78" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#eddb78" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#eddb78" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#eddb78"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">R</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#eddb78">LIQUIDATION RESEARCH</text>

  <g filter="url(#softGlow)">
    <circle cx="760" cy="300" r="160" fill="url(#nodeGlow)"/>
    <rect x="340" y="290" width="620" height="20" rx="10" fill="#111820" stroke="#eddb78" stroke-width="1.5"/>
    <rect x="340" y="290" width="420" height="20" rx="10" fill="#eddb78" fill-opacity="0.22"/>
    <line x1="760" y1="266" x2="760" y2="334" stroke="#eddb78" stroke-width="2.5" stroke-dasharray="2 6"/>
    <circle cx="700" cy="300" r="16" fill="#0e1420" stroke="#eddb78" stroke-width="3"/>
    <text x="340" y="274" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="start">Safe Zone</text>
    <text x="960" y="274" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="end">Liquidation Zone</text>
    <text x="760" y="356" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#eddb78" text-anchor="middle">Health Factor</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="42" fill="#eddb78">Liquidation Mechanics</text>
