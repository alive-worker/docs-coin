<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="交易所储备 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a3a3" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#f5a3a3" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f5a3a3" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#f5a3a3"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#f5a3a3">交易所研究</text>

  <g filter="url(#softGlow)">
    <circle cx="720" cy="190" r="110" fill="url(#nodeGlow)"/>
    <circle cx="720" cy="190" r="34" fill="#0e1420" stroke="#f5a3a3" stroke-width="2.5"/>
    <text x="720" y="195" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#f5a3a3" text-anchor="middle">ROOT</text>
    <line x1="720" y1="190" x2="530" y2="285" stroke="#f5a3a3" stroke-width="1.8"/>
    <circle cx="530" cy="285" r="8" fill="#111820" stroke="#f5a3a3" stroke-width="2"/>
    <line x1="530" y1="285" x2="435" y2="380" stroke="#f5a3a3" stroke-width="1.6" opacity="0.85"/>
    <line x1="530" y1="285" x2="625" y2="380" stroke="#f5a3a3" stroke-width="1.6" opacity="0.85"/>
    <line x1="720" y1="190" x2="910" y2="285" stroke="#f5a3a3" stroke-width="1.8"/>
    <circle cx="910" cy="285" r="8" fill="#111820" stroke="#f5a3a3" stroke-width="2"/>
    <line x1="910" y1="285" x2="815" y2="380" stroke="#f5a3a3" stroke-width="1.6" opacity="0.85"/>
    <line x1="910" y1="285" x2="1005" y2="380" stroke="#f5a3a3" stroke-width="1.6" opacity="0.85"/>

    <rect x="375" y="380" width="120" height="42" rx="9" fill="#0d1117" stroke="#f5a3a3" stroke-width="1.5"/>
    <text x="435" y="406" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#c9d3e0" text-anchor="middle">地址1</text>
    <rect x="565" y="380" width="120" height="42" rx="9" fill="#0d1117" stroke="#f5a3a3" stroke-width="1.5"/>
    <text x="625" y="406" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#c9d3e0" text-anchor="middle">地址2</text>
    <rect x="755" y="380" width="120" height="42" rx="9" fill="#0d1117" stroke="#f5a3a3" stroke-width="1.5"/>
    <text x="815" y="406" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#c9d3e0" text-anchor="middle">地址3</text>
    <rect x="945" y="380" width="120" height="42" rx="9" fill="#0d1117" stroke="#f5a3a3" stroke-width="1.5"/>
    <text x="1005" y="406" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#c9d3e0" text-anchor="middle">地址4</text>

  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#f5a3a3">交易所储备</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">Merkle树原理与链上托管核验</text>
</svg>
