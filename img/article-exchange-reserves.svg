<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="交易所储备证明与托管风险研究入门 主题配图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="55%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#060d16"/>
    </linearGradient>
    <linearGradient id="glowGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd57a"/>
      <stop offset="100%" stop-color="#e8ad3f"/>
    </linearGradient>
    <radialGradient id="haloGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ad3f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8ad3f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ad1e6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5ad1e6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#5ad1e6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <circle cx="960" cy="300" r="260" fill="url(#haloGold)"/>
  <circle cx="150" cy="520" r="220" fill="url(#haloCyan)"/>

  <g stroke="#5ad1e6" stroke-opacity="0.55" stroke-width="1.2">
    <line x1="0" y1="150" x2="1200" y2="150" stroke-dasharray="1 7"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-dasharray="1 7"/>
  </g>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">研</text>
    <text x="52" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">加密货币研究笔记</text>
    <text x="52" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#8fb3c9">链上数据与项目研究</text>
  </g>

  <g transform="translate(64,148)">
    <rect x="0" y="0" width="96" height="36" rx="18" fill="none" stroke="#e8ad3f" stroke-width="1.5"/>
    <text x="48" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#ffd57a" text-anchor="middle">交易所</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="238" font-size="32">储备证明与托管风险</text>
    <text x="64" y="284" font-size="32">链上核验研究入门</text>
  </g>
  <text x="64" y="330" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#8fb3c9">Merkle 储备证明 · 资产负债核实 · 链上快照交叉验证</text>

  <g transform="translate(945,300)" filter="url(#glow)">
    <circle r="150" fill="none" stroke="#173248" stroke-width="2"/>
    <circle r="150" fill="none" stroke="#5ad1e6" stroke-width="1.5" stroke-dasharray="2 10" stroke-opacity="0.7"/>
    <g stroke="url(#glowGold)" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="0" y1="-58" x2="-92" y2="-18"/>
      <line x1="0" y1="-58" x2="92" y2="-18"/>
      <line x1="0" y1="-58" x2="0" y2="70"/>
    </g>
    <g fill="#e8ad3f">
      <circle cx="0" cy="-58" r="6"/>
    </g>
    <g fill="none" stroke="url(#glowGold)" stroke-width="3">
      <path d="M-92,-18 a34,15 0 1,0 68,0"/>
      <path d="M92,-18 a34,15 0 1,0 -68,0"/>
    </g>
    <g fill="#5ad1e6" opacity="0.9">
      <circle cx="-92" cy="-18" r="5"/>
      <circle cx="92" cy="-18" r="5"/>
    </g>
    <rect x="-46" y="66" width="92" height="12" rx="4" fill="url(#glowGold)"/>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8fb3c9" text-anchor="middle">
      <text x="0" y="112">PROOF OF RESERVES</text>
    </g>
  </g>

  <g transform="translate(64,470)" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#8fb3c9">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">资产钱包</text></g>
    <g transform="translate(100,0)"><rect width="12" height="12" rx="3" fill="#5ad1e6"/><text x="18" y="10.5">负债快照</text></g>
    <g transform="translate(200,0)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">链上核验</text></g>
  </g>
</svg>
