<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="跨链聚合与Swap路由研究方法 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472c4" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#f472c4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f472c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#f472c4"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#f472c4">路由聚合</text>
  <g filter="url(#softGlow)">
    <circle cx="750" cy="280" r="180" fill="url(#nodeGlow)"/>
    <path d="M520 200 C 710 200, 710 230, 900 230" fill="none" stroke="#f472c4" stroke-width="2" stroke-dasharray="2 7" opacity="0.85"/>
    <path d="M900 230 C 800 230, 800 400, 700 400" fill="none" stroke="#f472c4" stroke-width="2" stroke-dasharray="2 7" opacity="0.85"/>
    <path d="M700 400 C 610 400, 610 200, 520 200" fill="none" stroke="#f472c4" stroke-width="2" stroke-dasharray="2 7" opacity="0.85"/>

    <circle cx="520" cy="200" r="34" fill="#0e1420" stroke="#f472c4" stroke-width="2.5"/>
    <text x="520" y="205" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#f472c4" text-anchor="middle">1</text>
    <text x="520" y="260" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">池子A</text>
    <circle cx="900" cy="230" r="34" fill="#0e1420" stroke="#f472c4" stroke-width="2.5"/>
    <text x="900" y="235" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#f472c4" text-anchor="middle">2</text>
    <text x="900" y="290" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">跨链桥</text>
    <circle cx="700" cy="400" r="34" fill="#0e1420" stroke="#f472c4" stroke-width="2.5"/>
    <text x="700" y="405" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#f472c4" text-anchor="middle">3</text>
    <text x="700" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9aa7bd" text-anchor="middle">池子B</text>

  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#f472c4">路由聚合</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">核验最优路径与隐藏成本</text>
</svg>
