<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DAO 治理研究入门 主题配图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#204a75"/>
      <stop offset="100%" stop-color="#0e2036"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">研</text>
    <text x="52" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">加密货币研究</text>
    <text x="52" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#a9bcd2">链上数据与项目研究</text>
  </g>

  <g transform="translate(64,148)">
    <rect x="0" y="0" width="96" height="36" rx="18" fill="#e8ad3f"/>
    <text x="48" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#1b1b18" text-anchor="middle">DAO 治理</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="238" font-size="34">提案生命周期、投票权与</text>
    <text x="64" y="290" font-size="34">金库多签链上核实</text>
  </g>
  <text x="64" y="336" font-family="'Segoe UI',Arial,sans-serif" font-size="17" fill="#b9c9dd">提案流程 · 投票权分布 · 金库多签与时间锁核实</text>

  <g transform="translate(880,220)">
    <path d="M0,0 L180,0 L210,60 L-30,60 Z" fill="#16324f" stroke="#5b8fc4" stroke-width="5"/>
    <rect x="-40" y="60" width="260" height="150" rx="10" fill="#16324f" stroke="#5b8fc4" stroke-width="5"/>
    <rect x="60" y="20" width="60" height="14" rx="4" fill="#0e2036"/>
    <g transform="translate(90,27)">
      <path d="M-14,0 L-4,10 L16,-14" fill="none" stroke="#e8ad3f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#c9d6e6">
      <rect x="-16" y="92" width="234" height="14" rx="7" fill="#1c3654"/>
      <rect x="-16" y="92" width="160" height="14" rx="7" fill="#e8ad3f"/>
      <text x="-16" y="126" fill="#9fb3cb" font-size="11">QUORUM</text>
      <rect x="-16" y="140" width="234" height="14" rx="7" fill="#1c3654"/>
      <rect x="-16" y="140" width="95" height="14" rx="7" fill="#7fc4a8"/>
      <text x="-16" y="174" fill="#9fb3cb" font-size="11">FOR / AGAINST</text>
    </g>
  </g>

  <g transform="translate(920,470)" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d6e6">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">提案</text></g>
    <g transform="translate(70,0)"><rect width="12" height="12" rx="3" fill="#5b8fc4"/><text x="18" y="10.5">投票</text></g>
    <g transform="translate(140,0)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">金库</text></g>
  </g>
</svg>
