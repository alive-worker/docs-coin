<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MEV and Private Order Flow cover image">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0703f" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#e0703f" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e0703f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#e0703f"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">R</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#e0703f">MEV</text>
  <g>
    <line x1="340" y1="290" x2="460" y2="290" stroke="#e0703f" stroke-width="2" opacity="0.8"/>
    <path d="M460 284 l10 6 l-10 6 z" fill="#e0703f"/>
    <line x1="550" y1="290" x2="670" y2="290" stroke="#e0703f" stroke-width="2" opacity="0.8"/>
    <path d="M670 284 l10 6 l-10 6 z" fill="#e0703f"/>
    <line x1="760" y1="290" x2="880" y2="290" stroke="#e0703f" stroke-width="2" opacity="0.8"/>
    <path d="M880 284 l10 6 l-10 6 z" fill="#e0703f"/>

    <g transform="translate(300,290)">
      <circle r="34" fill="#0e1420" stroke="#e0703f" stroke-width="2.5" />
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e0703f" text-anchor="middle">1</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">Submit</text>
    </g>
    <g transform="translate(510,290)">
      <circle r="34" fill="#0e1420" stroke="#e0703f" stroke-width="2.5" />
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e0703f" text-anchor="middle">2</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">Private Channel</text>
    </g>
    <g transform="translate(720,290)">
      <circle r="34" fill="#0e1420" stroke="#e0703f" stroke-width="2.5" />
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e0703f" text-anchor="middle">3</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">Builder Order</text>
    </g>
    <g transform="translate(930,290)">
      <circle r="34" fill="#0e1420" stroke="#e0703f" stroke-width="2.5" filter="url(#softGlow)"/>
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e0703f" text-anchor="middle">4</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">Block</text>
    </g>

  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="42" fill="#e0703f">MEV & Ordering</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">The sandwich attack just changed hands</text>
</svg>
