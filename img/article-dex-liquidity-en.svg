<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Researching DEX Liquidity and Swap Pricing cover image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="55%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#060d16"/>
    </linearGradient>
    <linearGradient id="glowViolet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbb8f7"/>
      <stop offset="100%" stop-color="#9a7fe0"/>
    </linearGradient>
    <radialGradient id="haloViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9a7fe0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#9a7fe0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ad3f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8ad3f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#5ad1e6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <circle cx="960" cy="290" r="260" fill="url(#haloViolet)"/>
  <circle cx="150" cy="520" r="220" fill="url(#haloGold)"/>

  <g stroke="#5ad1e6" stroke-opacity="0.55" stroke-width="1.2">
    <line x1="0" y1="150" x2="1200" y2="150" stroke-dasharray="1 7"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-dasharray="1 7"/>
  </g>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">R</text>
    <text x="52" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">Crypto Research Notes</text>
    <text x="52" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#8fb3c9">On-Chain Data &amp; Project Research</text>
  </g>

  <g transform="translate(64,148)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="none" stroke="#9a7fe0" stroke-width="1.5"/>
    <text x="65" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#cbb8f7" text-anchor="middle">DEX Liquidity</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="230" font-size="28">Researching DEX Liquidity</text>
    <text x="64" y="272" font-size="28">and Swap Pricing</text>
  </g>
  <text x="64" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#8fb3c9">Liquidity Depth · Price Impact · MEV Patterns</text>

  <g transform="translate(900,290)" filter="url(#glow)">
    <rect x="-160" y="-110" width="320" height="220" rx="14" fill="#0e1b2c" stroke="#5ad1e6" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="-136" cy="-84" r="5" fill="#e8ad3f"/>
    <circle cx="-116" cy="-84" r="5" fill="#5ad1e6" opacity="0.6"/>
    <circle cx="-96" cy="-84" r="5" fill="#7fc4a8" opacity="0.6"/>

    <circle cx="-90" cy="10" r="26" fill="#122535" stroke="url(#glowViolet)" stroke-width="2.5"/>
    <text x="-90" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#cbb8f7" text-anchor="middle">A</text>
    <circle cx="90" cy="10" r="26" fill="#122535" stroke="url(#glowViolet)" stroke-width="2.5"/>
    <text x="90" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#cbb8f7" text-anchor="middle">B</text>

    <path d="M-64 0 C -20 -22, 20 -22, 64 0" fill="none" stroke="url(#glowViolet)" stroke-width="2.5" stroke-dasharray="2 6"/>
    <path d="M-64 20 C -20 42, 20 42, 64 20" fill="none" stroke="url(#glowViolet)" stroke-width="2.5" stroke-dasharray="2 6"/>
    <path d="M60 -4 l8 4 l-8 4 z" fill="#cbb8f7"/>
    <path d="M-60 24 l-8 -4 l8 -4 z" fill="#cbb8f7"/>

    <text x="-90" y="52" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8fb3c9" text-anchor="middle">POOL A</text>
    <text x="90" y="52" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8fb3c9" text-anchor="middle">POOL B</text>
    <text x="0" y="90" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8fb3c9" text-anchor="middle">AMM SWAP</text>
  </g>

  <g transform="translate(64,470)" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#8fb3c9">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">Liquidity Depth</text></g>
    <g transform="translate(140,0)"><rect width="12" height="12" rx="3" fill="#5ad1e6"/><text x="18" y="10.5">Price Impact</text></g>
    <g transform="translate(260,0)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">MEV Patterns</text></g>
  </g>
</svg>
