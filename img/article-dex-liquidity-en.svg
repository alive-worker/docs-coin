<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DEX Liquidity cover image">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cbb8f7" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#cbb8f7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#cbb8f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#cbb8f7"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">R</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#cbb8f7">DEX RESEARCH</text>

  <g transform="translate(700,300)" filter="url(#softGlow)">
    <circle r="150" fill="url(#nodeGlow)"/>
    <circle cx="-140" cy="0" r="42" fill="#111820" stroke="#cbb8f7" stroke-width="2.5"/>
    <text x="-140" y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#cbb8f7" text-anchor="middle">A</text>
    <circle cx="140" cy="0" r="42" fill="#111820" stroke="#cbb8f7" stroke-width="2.5"/>
    <text x="140" y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#cbb8f7" text-anchor="middle">B</text>
    <path d="M-98 -14 C -30 -34, 30 -34, 98 -14" fill="none" stroke="#cbb8f7" stroke-width="2.5" stroke-dasharray="2 7"/>
    <path d="M-98 24 C -30 48, 30 48, 98 24" fill="none" stroke="#cbb8f7" stroke-width="2.5" stroke-dasharray="2 7"/>
    <path d="M92 -20 l9 6 l-9 6 z" fill="#cbb8f7"/>
    <path d="M-92 30 l-9 -6 l9 -6 z" fill="#cbb8f7"/>
    <text x="-140" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="middle">POOL A</text>
    <text x="140" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#9aa7bd" text-anchor="middle">POOL B</text>
    <text y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#cbb8f7" text-anchor="middle">AMM SWAP</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="42" fill="#cbb8f7">DEX Liquidity</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">Swap price discovery and MEV mechanics</text>
</svg>
