<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="空投与女巫地址识别研究入门 主题配图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="55%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#060d16"/>
    </linearGradient>
    <linearGradient id="glowOlive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d3e39a"/>
      <stop offset="100%" stop-color="#93ab52"/>
    </linearGradient>
    <radialGradient id="haloOlive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93ab52" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#93ab52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ad3f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8ad3f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#5ad1e6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <circle cx="960" cy="290" r="260" fill="url(#haloOlive)"/>
  <circle cx="150" cy="520" r="220" fill="url(#haloGold)"/>

  <g stroke="#5ad1e6" stroke-opacity="0.55" stroke-width="1.2">
    <line x1="0" y1="150" x2="1200" y2="150" stroke-dasharray="1 7"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-dasharray="1 7"/>
  </g>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">研</text>
    <text x="52" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">加密货币研究笔记</text>
    <text x="52" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#8fb3c9">链上数据与项目研究</text>
  </g>

  <g transform="translate(64,148)">
    <rect x="0" y="0" width="112" height="36" rx="18" fill="none" stroke="#93ab52" stroke-width="1.5"/>
    <text x="56" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#d3e39a" text-anchor="middle">空投研究</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="230" font-size="30">空投与女巫地址</text>
    <text x="64" y="272" font-size="30">识别研究入门</text>
  </g>
  <text x="64" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#8fb3c9">分发分散度核验 · 地址聚类识别 · 女巫模式分析</text>

  <g transform="translate(900,290)" filter="url(#glow)">
    <rect x="-160" y="-110" width="320" height="220" rx="14" fill="#0e1b2c" stroke="#5ad1e6" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="-136" cy="-84" r="5" fill="#e8ad3f"/>
    <circle cx="-116" cy="-84" r="5" fill="#5ad1e6" opacity="0.6"/>
    <circle cx="-96" cy="-84" r="5" fill="#7fc4a8" opacity="0.6"/>

    <circle cx="0" cy="10" r="14" fill="url(#glowOlive)"/>
    <g stroke="url(#glowOlive)" stroke-width="1.5" opacity="0.85">
      <line x1="0" y1="10" x2="-95" y2="-40"/>
      <line x1="0" y1="10" x2="-95" y2="0"/>
      <line x1="0" y1="10" x2="-95" y2="45"/>
      <line x1="0" y1="10" x2="95" y2="-45"/>
    </g>
    <circle cx="-95" cy="-40" r="8" fill="#122535" stroke="#e8ad3f" stroke-width="2"/>
    <circle cx="-95" cy="0" r="8" fill="#122535" stroke="#e8ad3f" stroke-width="2"/>
    <circle cx="-95" cy="45" r="8" fill="#122535" stroke="#e8ad3f" stroke-width="2"/>
    <circle cx="95" cy="-45" r="8" fill="#122535" stroke="#5ad1e6" stroke-width="2"/>
    <rect x="-118" y="-58" width="60" height="120" rx="10" fill="none" stroke="#e8ad3f" stroke-width="1.3" stroke-dasharray="3 4" opacity="0.7"/>

    <text x="-95" y="70" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#e8ad3f" text-anchor="middle">CLUSTER</text>
    <text x="0" y="98" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8fb3c9" text-anchor="middle">SYBIL PATTERN</text>
  </g>

  <g transform="translate(64,470)" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#8fb3c9">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">疑似女巫地址</text></g>
    <g transform="translate(110,0)"><rect width="12" height="12" rx="3" fill="#5ad1e6"/><text x="18" y="10.5">独立地址</text></g>
    <g transform="translate(210,0)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">分发节点</text></g>
  </g>
</svg>
