<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="工具订阅 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aee094" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#aee094" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#aee094" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#aee094"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#aee094">工具订阅</text>

  <g>
    <line x1="340" y1="290" x2="460" y2="290" stroke="#aee094" stroke-width="2" opacity="0.8"/>
    <path d="M460 284 l10 6 l-10 6 z" fill="#aee094"/>
    <line x1="550" y1="290" x2="670" y2="290" stroke="#aee094" stroke-width="2" opacity="0.8"/>
    <path d="M670 284 l10 6 l-10 6 z" fill="#aee094"/>

    <g transform="translate(300,290)">
      <circle r="34" fill="#0e1420" stroke="#aee094" stroke-width="2.5" />
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#aee094" text-anchor="middle">1</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">选路径</text>
    </g>
    <g transform="translate(510,290)">
      <circle r="34" fill="#0e1420" stroke="#aee094" stroke-width="2.5" />
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#aee094" text-anchor="middle">2</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">充值</text>
    </g>
    <g transform="translate(720,290)">
      <circle r="34" fill="#0e1420" stroke="#aee094" stroke-width="2.5" filter="url(#softGlow)"/>
      <text y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#aee094" text-anchor="middle">3</text>
      <text y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c9d3e0" text-anchor="middle">订阅</text>
    </g>

  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#aee094">工具订阅</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">研究工具订阅支付实操指南</text>
</svg>
