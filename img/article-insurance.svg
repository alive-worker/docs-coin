<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="链上保险协议研究方法 主题配图">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6de8ac" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#6de8ac" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6de8ac" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#6de8ac"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#6de8ac">链上保险</text>
  <g filter="url(#softGlow)">
    <circle cx="420" cy="300" r="140" fill="url(#nodeGlow)"/>
    <path d="M420 190 l70 26 v70 c0 55 -35 88 -70 100 c-35 -12 -70 -45 -70 -100 v-70 z" fill="none" stroke="#6de8ac" stroke-width="3" stroke-linejoin="round"/>
    <path d="M392 300 l16 18 l40 -46" fill="none" stroke="#6de8ac" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
    <g transform="translate(620,210)">
      <circle r="12" fill="none" stroke="#6de8ac" stroke-width="2"/>
      <path d="M-5 0 L-1 4 L6 -5" fill="none" stroke="#6de8ac" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#c9d3e0">承保范围核验</text>
    </g>
    <g transform="translate(620,266)">
      <circle r="12" fill="none" stroke="#6de8ac" stroke-width="2"/>
      <path d="M-5 0 L-1 4 L6 -5" fill="none" stroke="#6de8ac" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#c9d3e0">储备赔付能力</text>
    </g>
    <g transform="translate(620,322)">
      <circle r="12" fill="none" stroke="#6de8ac" stroke-width="2"/>
      <path d="M-5 0 L-1 4 L6 -5" fill="none" stroke="#6de8ac" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="5" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#c9d3e0">理赔仲裁信任面</text>
    </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="56" fill="#6de8ac">链上保险</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">核验承保范围与赔付能力</text>
</svg>
