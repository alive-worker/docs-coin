<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Team Research cover image">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a9c4" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#f5a9c4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f5a9c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#f5a9c4"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">R</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">Crypto Research Notes</text>
  </g>

  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#f5a9c4">TEAM RESEARCH</text>

  <g filter="url(#softGlow)">
    <line x1="310" y1="300" x2="1030" y2="300" stroke="#f5a9c4" stroke-width="2" opacity="0.5"/>
    <circle cx="330" cy="300" r="8" fill="#111820" stroke="#f5a9c4" stroke-width="2"/>
    <circle cx="500" cy="300" r="12" fill="#111820" stroke="#f5a9c4" stroke-width="2"/>
    <circle cx="670" cy="300" r="16" fill="#111820" stroke="#f5a9c4" stroke-width="2"/>
    <circle cx="840" cy="300" r="8" fill="#111820" stroke="#f5a9c4" stroke-width="2"/>
    <circle cx="1010" cy="300" r="12" fill="#111820" stroke="#f5a9c4" stroke-width="2"/>

    <text x="330" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9aa7bd" text-anchor="middle">Commit</text>
    <text x="500" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9aa7bd" text-anchor="middle">Commit</text>
    <text x="670" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9aa7bd" text-anchor="middle">Release</text>
    <text x="840" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9aa7bd" text-anchor="middle">Commit</text>
    <text x="1010" y="346" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#9aa7bd" text-anchor="middle">Release</text>

    <circle cx="1010" cy="300" r="60" fill="url(#nodeGlow)"/>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="42" fill="#f5a9c4">Team Research</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">Verifying identity and developer activity</text>
</svg>
