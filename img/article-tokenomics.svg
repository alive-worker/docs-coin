<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="代币经济学研究入门 封面图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#204a75"/>
      <stop offset="100%" stop-color="#0e2036"/>
    </linearGradient>
    <linearGradient id="ringShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="60" cy="520" r="2.5"/><circle cx="100" cy="520" r="2.5"/><circle cx="140" cy="520" r="2.5"/>
    <circle cx="60" cy="560" r="2.5"/><circle cx="100" cy="560" r="2.5"/><circle cx="140" cy="560" r="2.5"/>
    <circle cx="1120" cy="60" r="2.5"/><circle cx="1080" cy="60" r="2.5"/><circle cx="1040" cy="60" r="2.5"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">研</text>
    <text x="52" y="17" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">加密货币研究笔记</text>
    <text x="52" y="35" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="12.5" fill="#a9bcd2">链上数据与项目研究</text>
  </g>

  <!-- category pill -->
  <g transform="translate(64,148)">
    <rect x="0" y="0" width="128" height="36" rx="18" fill="#8a5a0b"/>
    <text x="64" y="24" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="14.5" font-weight="700" fill="#fbe9c8" text-anchor="middle">代币经济学</text>
  </g>

  <!-- headline -->
  <g font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="238" font-size="40">读懂代币分配、解锁节奏</text>
    <text x="64" y="290" font-size="40">与真实流通</text>
  </g>
  <text x="64" y="336" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#b9c9dd">供应结构 · 解锁计划 · 链上交叉验证</text>

  <!-- decorative donut chart representing token allocation -->
  <g transform="translate(940,300)">
    <circle cx="0" cy="30" r="150" fill="url(#ringShadow)"/>
    <g transform="rotate(-90)">
      <circle r="120" fill="none" stroke="#1c3654" stroke-width="34"/>
      <circle r="120" fill="none" stroke="#e8ad3f" stroke-width="34" stroke-dasharray="150 604" stroke-dashoffset="0" stroke-linecap="round"/>
      <circle r="120" fill="none" stroke="#5b8fc4" stroke-width="34" stroke-dasharray="180 604" stroke-dashoffset="-158" stroke-linecap="round"/>
      <circle r="120" fill="none" stroke="#7fc4a8" stroke-width="34" stroke-dasharray="110 604" stroke-dashoffset="-346" stroke-linecap="round"/>
      <circle r="120" fill="none" stroke="#c9d6e6" stroke-width="34" stroke-dasharray="90 604" stroke-dashoffset="-464" stroke-linecap="round"/>
    </g>
    <text x="0" y="-4" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#f3f6fb" text-anchor="middle">代币分配</text>
    <text x="0" y="20" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#9fb3cb" text-anchor="middle">TOKEN ALLOCATION</text>
  </g>

  <!-- legend -->
  <g transform="translate(760,470)" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#c9d6e6">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">团队与投资人</text></g>
    <g transform="translate(150,0)"><rect width="12" height="12" rx="3" fill="#5b8fc4"/><text x="18" y="10.5">生态与基金会</text></g>
    <g transform="translate(0,26)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">社区与空投</text></g>
    <g transform="translate(150,26)"><rect width="12" height="12" rx="3" fill="#c9d6e6"/><text x="18" y="10.5">流动性挖矿</text></g>
  </g>
</svg>
