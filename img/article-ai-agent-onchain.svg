<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="链上 AI 代理资金托管研究 主题配图">
  <defs>
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#4fd1c5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4fd1c5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aiEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#6f8fd9"/>
    </linearGradient>
    <filter id="aiSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="aiDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="#0a0a0f"/>
  <rect width="1200" height="600" fill="url(#aiDots)"/>
  <g transform="translate(64,54)">
    <rect x="0" y="0" width="34" height="34" rx="9" fill="#4fd1c5"/>
    <text x="17" y="23" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#0a0a0f" text-anchor="middle">研</text>
    <text x="44" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7f8aa3">加密货币研究 · AI×链上 系列</text>
  </g>
  <text x="64" y="128" font-family="'Consolas','Segoe UI',monospace" font-size="18" letter-spacing="2" fill="#4fd1c5">链上 AI 代理 · 资金托管核验</text>
  <g transform="translate(720,300)" filter="url(#aiSoft)">
    <circle r="210" fill="url(#aiGlow)" opacity="0.65"/>
    <g stroke="url(#aiEdge)" stroke-width="1.6" opacity="0.7">
      <line x1="0" y1="0" x2="-150" y2="-96"/>
      <line x1="0" y1="0" x2="150" y2="-96"/>
      <line x1="0" y1="0" x2="-168" y2="70"/>
      <line x1="0" y1="0" x2="168" y2="70"/>
      <line x1="0" y1="0" x2="0" y2="150"/>
    </g>
    <g fill="#111820" stroke="url(#aiEdge)" stroke-width="2">
      <circle cx="-150" cy="-96" r="26"/>
      <circle cx="150" cy="-96" r="26"/>
      <circle cx="-168" cy="70" r="26"/>
      <circle cx="168" cy="70" r="26"/>
      <circle cx="0" cy="150" r="26"/>
    </g>
    <circle cx="0" cy="0" r="52" fill="#0d1b1a" stroke="#4fd1c5" stroke-width="3"/>
    <text x="0" y="-2" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="800" fill="#4fd1c5" text-anchor="middle">AI</text>
    <text x="0" y="18" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#7f8aa3" text-anchor="middle">Agent</text>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#c9d3e0" text-anchor="middle">
      <text x="-150" y="-92">权限</text>
      <text x="150" y="-92">私钥</text>
      <text x="-168" y="74">额度</text>
      <text x="168" y="74">签名</text>
      <text x="0" y="154">合约</text>
    </g>
  </g>
  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="800">
    <text x="64" y="500" font-size="52" fill="#4fd1c5">AI 代理托管你的钱</text>
  </g>
  <text x="64" y="536" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#7f8aa3">它的权限边界，到底由谁设定</text>
</svg>
