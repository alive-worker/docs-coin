<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Researching Oracles and Price Feeds cover image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="55%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#060d16"/>
    </linearGradient>
    <linearGradient id="glowCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fe9f5"/>
      <stop offset="100%" stop-color="#3fb8cc"/>
    </linearGradient>
    <radialGradient id="haloCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb8cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3fb8cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ad3f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8ad3f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#5ad1e6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <circle cx="960" cy="290" r="260" fill="url(#haloCyan)"/>
  <circle cx="150" cy="520" r="220" fill="url(#haloGold)"/>

  <g stroke="#5ad1e6" stroke-opacity="0.55" stroke-width="1.2">
    <line x1="0" y1="150" x2="1200" y2="150" stroke-dasharray="1 7"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-dasharray="1 7"/>
  </g>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#e8ad3f"/>
    <text x="20" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1b1b18" text-anchor="middle">R</text>
    <text x="52" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f3f6fb">Crypto Research Notes</text>
    <text x="52" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#8fb3c9">On-Chain Data &amp; Project Research</text>
  </g>

  <g transform="translate(64,148)">
    <rect x="0" y="0" width="70" height="36" rx="18" fill="none" stroke="#3fb8cc" stroke-width="1.5"/>
    <text x="35" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#8fe9f5" text-anchor="middle">Oracle</text>
  </g>

  <g font-family="'Segoe UI',Arial,sans-serif" font-weight="700" fill="#f3f6fb">
    <text x="64" y="230" font-size="28">Researching Oracles</text>
    <text x="64" y="272" font-size="28">and Price Feeds</text>
  </g>
  <text x="64" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#8fb3c9">Source Verification · Aggregation · Manipulation Risk</text>

  <g transform="translate(900,290)" filter="url(#glow)">
    <rect x="-160" y="-110" width="320" height="220" rx="14" fill="#0e1b2c" stroke="#5ad1e6" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="-136" cy="-84" r="5" fill="#e8ad3f"/>
    <circle cx="-116" cy="-84" r="5" fill="#5ad1e6" opacity="0.6"/>
    <circle cx="-96" cy="-84" r="5" fill="#7fc4a8" opacity="0.6"/>

    <g stroke="url(#glowCyan)" stroke-width="2" fill="none" opacity="0.85">
      <line x1="-110" y1="-45" x2="0" y2="20"/>
      <line x1="-40" y1="-45" x2="0" y2="20"/>
      <line x1="40" y1="-45" x2="0" y2="20"/>
      <line x1="110" y1="-45" x2="0" y2="20"/>
    </g>
    <g>
      <circle cx="-110" cy="-52" r="9" fill="#122535" stroke="#5ad1e6" stroke-width="1.5"/>
      <circle cx="-40" cy="-52" r="9" fill="#122535" stroke="#5ad1e6" stroke-width="1.5"/>
      <circle cx="40" cy="-52" r="9" fill="#122535" stroke="#5ad1e6" stroke-width="1.5"/>
      <circle cx="110" cy="-52" r="9" fill="#122535" stroke="#5ad1e6" stroke-width="1.5"/>
    </g>
    <circle cx="0" cy="20" r="26" fill="#0e1b2c" stroke="url(#glowCyan)" stroke-width="2.5"/>
    <circle cx="0" cy="20" r="12" fill="url(#glowCyan)"/>
    <g stroke="url(#glowCyan)" stroke-width="2" opacity="0.7">
      <line x1="0" y1="46" x2="0" y2="70"/>
    </g>
    <rect x="-34" y="70" width="68" height="20" rx="5" fill="none" stroke="#5ad1e6" stroke-width="1.3" stroke-opacity="0.7"/>
    <text x="0" y="98" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8fb3c9" text-anchor="middle">PRICE ORACLE</text>
  </g>

  <g transform="translate(64,470)" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#8fb3c9">
    <g transform="translate(0,0)"><rect width="12" height="12" rx="3" fill="#e8ad3f"/><text x="18" y="10.5">Data Sources</text></g>
    <g transform="translate(115,0)"><rect width="12" height="12" rx="3" fill="#5ad1e6"/><text x="18" y="10.5">Aggregation</text></g>
    <g transform="translate(220,0)"><rect width="12" height="12" rx="3" fill="#7fc4a8"/><text x="18" y="10.5">On-Chain Write</text></g>
  </g>
</svg>
